<!DOCTYPE html>
<html>
<head>
    <title>NAD 뱅킹 - 계좌 개설</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .register-box { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 350px; }
        h2 { color: #34a853; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #34a853; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background-color: #2d8e47; }
    </style>
</head>
<body>
    <div class="register-box">
        <h2>🌱 신규 계좌 개설</h2>
        <p>가상중앙은행의 가족이 되어보세요!</p>
        <form method="POST">
            <input type="text" name="user_id" placeholder="사용할 아이디" required>
            <input type="password" name="pw" placeholder="비밀번호" required>
            <input type="text" name="name" placeholder="사용자 이름" required>
            <button type="submit">계좌 개설하기</button>
        </form>
        <p style="margin-top: 20px;"><a href="/" style="color: #666; font-size: 13px;">이미 계좌가 있나요? 로그인</a></p>
    </div>
</body>
</html>
